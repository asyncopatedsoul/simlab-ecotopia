<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biotope storage bench</title>
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        margin: 2rem;
        max-width: 60rem;
      }
      h1 {
        margin-top: 0;
      }
      pre {
        background: #f4f4f4;
        padding: 1rem;
        border-radius: 0.5rem;
        white-space: pre-wrap;
      }
      button {
        font: inherit;
        padding: 0.5rem 1rem;
        margin-right: 0.5rem;
      }
      .ok {
        color: #1a5e2a;
      }
      .fail {
        color: #a02020;
      }
    </style>
  </head>
  <body>
    <h1>Biotope storage bench (bd-plat.4)</h1>
    <p>
      Runs the acceptance benchmarks from <code>bd-plat.4</code> in this browser.
      Perf numbers depend on the host machine — for the formal tablet-class
      acceptance check, use the device the soft-launch targets.
    </p>
    <p>
      <button id="run-blob">50 MiB OPFS round-trip</button>
      <button id="run-species">10K-row species query</button>
      <button id="run-quota">Quota observer</button>
      <button id="run-all">Run all</button>
    </p>
    <pre id="out">(idle)</pre>
    <script type="module" src="./storage-bench.ts"></script>
  </body>
</html>
